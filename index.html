<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pro Video Call</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body { margin:0; background:#0f172a; color:#fff; font-family:sans-serif;}
#videos { display:flex; flex-wrap:wrap; }
video { width:50%; height:200px; object-fit:cover; }

.top { text-align:center; padding:10px;}
input { padding:10px; }
button { padding:10px; margin:5px; }

#chat { position:fixed; right:0; top:0; width:250px; height:100%; background:#111;}
#messages { height:80%; overflow:auto; }
</style>
</head>

<body>

<div class="top">
  <button onclick="createRoom()">Create Room</button>
  <input id="roomInput" placeholder="Enter Room ID">
  <button onclick="joinRoom()">Join</button>
</div>

<div id="videos"></div>

<div class="top">
  <button onclick="toggleMic()">🎤</button>
  <button onclick="toggleCam()">📷</button>
  <button onclick="shareScreen()">🖥️ Screen</button>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
// 🔗 ROOM
let peer = new Peer();
let connections = [];
let localStream;

peer.on('open', id => {
  console.log("Your ID:", id);
});

// 🎥 START CAMERA
async function startVideo(){
  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  let video = document.createElement("video");
  video.srcObject = localStream;
  video.autoplay = true;
  video.muted = true;
  document.getElementById("videos").appendChild(video);
}

// 🔗 CREATE ROOM
function createRoom(){
  let roomId = Math.random().toString(36).substr(2,6);
  location.hash = roomId;
  alert("Share this link:\n" + location.href);
}

// 🔗 JOIN ROOM
function joinRoom(){
  let roomId = document.getElementById("roomInput").value || location.hash.substring(1);

  if(!roomId) return alert("Enter Room ID");

  startVideo();

  let conn = peer.connect(roomId);
  setupConn(conn);

  peer.on('connection', conn => {
    setupConn(conn);
  });

  peer.on('call', call => {
    call.answer(localStream);
    call.on('stream', stream => addVideo(stream));
  });

  setTimeout(()=>{
    let call = peer.call(roomId, localStream);
    call.on('stream', stream => addVideo(stream));
  },1000);
}

// 🎥 ADD VIDEO
function addVideo(stream){
  let video = document.createElement("video");
  video.srcObject = stream;
  video.autoplay = true;
  document.getElementById("videos").appendChild(video);
}

// 💬 CHAT
function setupConn(conn){
  connections.push(conn);

  conn.on('data', data => {
    let msg = document.createElement("div");
    msg.innerText = data;
    document.getElementById("messages").appendChild(msg);
  });
}

function sendMsg(){
  let text = document.getElementById("msg").value;
  connections.forEach(c => c.send(text));
}

// 🎤 MIC
function toggleMic(){
  localStream.getAudioTracks()[0].enabled =
    !localStream.getAudioTracks()[0].enabled;
}

// 📷 CAM
function toggleCam(){
  localStream.getVideoTracks()[0].enabled =
    !localStream.getVideoTracks()[0].enabled;
}

// 🖥️ SCREEN SHARE
async function shareScreen(){
  let screen = await navigator.mediaDevices.getDisplayMedia({video:true});
  addVideo(screen);
}

// 📱 PWA INSTALL
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  alert("Install App Available!");
});

// 🔄 AUTO JOIN FROM LINK
window.onload = () => {
  if(location.hash){
    document.getElementById("roomInput").value = location.hash.substring(1);
  }
};
</script>

</body>
</html>
