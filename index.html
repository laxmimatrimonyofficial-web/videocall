<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Video Call App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h2 {
  margin: 10px;
}

.container {
  padding: 10px;
}

video {
  width: 48%;
  border-radius: 12px;
  margin: 5px;
  background: black;
}

.controls {
  margin: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

button.end {
  background: #ef4444;
}

#chatBox {
  height: 120px;
  overflow-y: auto;
  border: 1px solid #333;
  margin: 10px;
  padding: 5px;
  border-radius: 8px;
}

input {
  padding: 10px;
  width: 65%;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h2>🌍 Instant Call (No Login)</h2>

<div class="container">

<button onclick="createRoom()">🔗 Create Call Link</button>
<p id="link"></p>

<br>

<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>

<div class="controls">
  <button onclick="startMedia()">🎥 Start Camera</button>
  <button class="end" onclick="endCall()">❌ End</button>
</div>

<h3>💬 Chat</h3>
<div id="chatBox"></div>
<input id="msg" placeholder="Type message..." />
<button onclick="sendMsg()">Send</button>

</div>

<script>
let peer;
let call;
let conn;
let localStream;

const room = location.hash.substring(1);

function createRoom() {
  const id = Math.random().toString(36).substr(2, 6);
  const url = location.href.split('#')[0] + "#" + id;
  document.getElementById("link").innerText = url;
}

function initPeer(id) {
  peer = new Peer(id);

  peer.on('call', incomingCall => {
    call = incomingCall;
    call.answer(localStream);

    call.on('stream', stream => {
      document.getElementById("remoteVideo").srcObject = stream;
    });
  });

  peer.on('connection', connection => {
    conn = connection;

    conn.on('data', data => {
      addMsg("Friend: " + data);
    });
  });
}

async function startMedia() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: { width: 1280, height: 720 },
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;

  if (room) {
    startJoining();
  } else {
    initPeer();
  }
}

function startJoining() {
  initPeer();

  peer.on('open', id => {
    call = peer.call(room, localStream);

    call.on('stream', stream => {
      document.getElementById("remoteVideo").srcObject = stream;
    });

    conn = peer.connect(room);

    conn.on('data', data => {
      addMsg("Friend: " + data);
    });
  });
}

function sendMsg() {
  const msg = document.getElementById("msg").value;
  if (conn) {
    conn.send(msg);
    addMsg("You: " + msg);
  }
}

function addMsg(msg) {
  const box = document.getElementById("chatBox");
  box.innerHTML += "<p>" + msg + "</p>";
  box.scrollTop = box.scrollHeight;
}

function endCall() {
  if (call) call.close();
  if (conn) conn.close();
  location.reload();
}
</script>

</body>
</html>
